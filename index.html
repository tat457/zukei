<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛囲いゲーム</title>
<style>
body { margin:0; font-family:sans-serif; }
#menu { text-align:center; padding:20px; }
button, select { margin:5px; padding:10px; font-size:16px; }
canvas { display:none; background:#88cc66; }

/* ゲーム中UI */
#ui {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(255,255,255,0.8);
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
  display:none;
}
</style>
</head>
<body>

<div id="menu">
  <h1>牛囲いゲーム</h1>

  <select id="shapeSelect">
    <option>円</option>
    <option>三角形</option>
    <option>四角形</option>
    <option>台形</option>
    <option>五角形</option>
  </select>

  <br><br>
  <button onclick="startGame()">スタート</button>
</div>

<div id="ui">図形: <span id="currentShape"></span></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let cows = [];
let path = [];
let fence = null;
let drawing = false;
let selectedShape = "";

// 牛生成
function createCow(){
  return {
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    angle: 0,
    radius: 15
  };
}

function startGame(){
  selectedShape = document.getElementById("shapeSelect").value;

  document.getElementById("menu").style.display="none";
  document.getElementById("ui").style.display="block";
  document.getElementById("currentShape").innerText = selectedShape;

  canvas.style.display="block";

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  cows = [createCow(), createCow(), createCow()];
  requestAnimationFrame(loop);
}

// メインループ
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#88cc66";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawFence();

  cows.forEach(c=>{
    moveCow(c);
    drawCow(c);
  });

  drawPath();

  requestAnimationFrame(loop);
}

// 牛移動
function moveCow(c){
  c.x += c.vx;
  c.y += c.vy;

  if(c.x<0||c.x>canvas.width) c.vx*=-1;
  if(c.y<0||c.y>canvas.height) c.vy*=-1;

  reflectFromLine(c, path);
  if(fence) reflectFromLine(c, fence, true);

  c.angle = Math.atan2(c.vy, c.vx);
}

// 線反射
function reflectFromLine(c, line, closed=false){
  if(!line || line.length<2) return;

  for(let i=0;i<line.length-1;i++){
    let p1 = line[i];
    let p2 = line[i+1];

    let dist = pointToSegmentDistance(c.x, c.y, p1.x, p1.y, p2.x, p2.y);

    if(dist < c.radius){
      c.vx *= -1;
      c.vy *= -1;
      c.x += c.vx * 3;
      c.y += c.vy * 3;
      return;
    }
  }

  if(closed){
    let p1 = line[line.length-1];
    let p2 = line[0];

    let dist = pointToSegmentDistance(c.x, c.y, p1.x, p1.y, p2.x, p2.y);

    if(dist < c.radius){
      c.vx *= -1;
      c.vy *= -1;
      c.x += c.vx * 3;
      c.y += c.vy * 3;
    }
  }
}

// 牛描画
function drawCow(c){
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  ctx.fillStyle="#5a3d2b";
  ctx.beginPath();
  ctx.ellipse(0,0,20,12,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#3d2a1f";
  ctx.beginPath();
  ctx.arc(20,0,8,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="#000";
  ctx.beginPath();
  ctx.moveTo(-10,10); ctx.lineTo(-10,20);
  ctx.moveTo(10,10); ctx.lineTo(10,20);
  ctx.stroke();

  ctx.restore();
}

// 描画中
function drawPath(){
  if(path.length<2) return;
  ctx.strokeStyle="black";
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  path.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

// 柵
function drawFence(){
  if(!fence) return;
  ctx.strokeStyle="brown";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(fence[0].x,fence[0].y);
  fence.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.stroke();
}

// 入力
canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("touchstart",startDraw);

canvas.addEventListener("mousemove",draw);
canvas.addEventListener("touchmove",draw);

canvas.addEventListener("mouseup",endDraw);
canvas.addEventListener("touchend",endDraw);

function getPos(e){
  if(e.touches){
    return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  return {x:e.clientX,y:e.clientY};
}

function startDraw(){
  drawing=true;
  path=[];
}

function draw(e){
  if(!drawing) return;
  path.push(getPos(e));
}

function endDraw(){
  drawing=false;
  if(path.length<3) return;

  fence = path;

  let insideAll = cows.every(c=>pointInPolygon(c, fence));
  if(insideAll){
    setTimeout(()=>alert("クリア！"),100);
  }
}

// 内側判定
function pointInPolygon(point, vs) {
  let x = point.x, y = point.y;
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i].x, yi = vs[i].y;
    let xj = vs[j].x, yj = vs[j].y;

    let intersect = ((yi > y) != (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// 距離
function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
  let A = px - x1;
  let B = py - y1;
  let C = x2 - x1;
  let D = y2 - y1;

  let dot = A * C + B * D;
  let len_sq = C * C + D * D;
  let param = len_sq !== 0 ? dot / len_sq : -1;

  let xx, yy;

  if (param < 0) { xx = x1; yy = y1; }
  else if (param > 1) { xx = x2; yy = y2; }
  else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }

  let dx = px - xx;
  let dy = py - yy;
  return Math.sqrt(dx * dx + dy * dy);
}
</script>

</body>
</html>
