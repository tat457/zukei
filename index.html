<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛囲いゲーム</title>
<style>
html, body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#88cc66;
}
#menu {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:linear-gradient(#c9f7a5,#88cc66);
  z-index:10;
}
select, button {
  font-size:18px;
  padding:12px 16px;
  border:none;
  border-radius:12px;
}
button { background:#2f7d32; color:white; }

#game { display:none; width:100vw; height:100vh; }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(255,255,255,0.8);
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
  display:none;
}
</style>
</head>
<body>

<div id="menu">
  <h1>牛囲いゲーム</h1>
  <select id="shapeSelect">
    <option>円</option>
    <option>三角形</option>
    <option>四角形</option>
    <option>台形</option>
    <option>五角形</option>
  </select>
  <button onclick="startGame()">スタート</button>
</div>

<div id="ui">図形: <span id="currentShape"></span></div>

<canvas id="game"></canvas>

<!-- ★BGM -->
<audio id="bgm" src="bocjou.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let cows=[], path=[], fence=null, drawing=false;
let selectedShape="";
let frameCount=0;

// 牛
function createCow(){
  return {
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    angle:0,
    radius:18,
    lastHit:-100
  };
}

function startGame(){
  selectedShape=document.getElementById("shapeSelect").value;

  document.getElementById("menu").style.display="none";
  document.getElementById("ui").style.display="block";
  document.getElementById("currentShape").innerText=selectedShape;

  canvas.style.display="block";
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  cows=[createCow(),createCow(),createCow()];

  // ★BGM再生
  const bgm=document.getElementById("bgm");
  bgm.currentTime=0;
  bgm.play().catch(()=>{});

  requestAnimationFrame(loop);
}

// ループ
function loop(){
  frameCount++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#88cc66";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(fence) drawFence();
  if(path.length>1) drawPath();

  cows.forEach(c=>{
    moveCow(c);
    drawCow(c);
  });

  requestAnimationFrame(loop);
}

// 牛移動
function moveCow(c){
  c.x+=c.vx;
  c.y+=c.vy;

  if(c.x<0||c.x>canvas.width) c.vx*=-1;
  if(c.y<0||c.y>canvas.height) c.vy*=-1;

  reflect(c,path,false);
  if(fence) reflect(c,fence,true);

  c.angle=Math.atan2(c.vy,c.vx);
}

// 反射
function reflect(c,line,closed){
  if(!line||line.length<2) return;

  for(let i=0;i<line.length-1;i++){
    if(hit(c,line[i],line[i+1])) return;
  }
  if(closed){
    hit(c,line[line.length-1],line[0]);
  }
}

function hit(c,p1,p2){
  let n=nearest(c.x,c.y,p1.x,p1.y,p2.x,p2.y);
  let dx=c.x-n.x, dy=c.y-n.y;
  let d=Math.hypot(dx,dy);

  if(d<c.radius){
    let nx=dx/(d||1), ny=dy/(d||1);
    let dot=c.vx*nx+c.vy*ny;
    c.vx-=2*dot*nx;
    c.vy-=2*dot*ny;
    c.x=n.x+nx*(c.radius+1);
    c.y=n.y+ny*(c.radius+1);
    return true;
  }
  return false;
}

function nearest(px,py,x1,y1,x2,y2){
  let t=((px-x1)*(x2-x1)+(py-y1)*(y2-y1))/((x2-x1)**2+(y2-y1)**2||1);
  t=Math.max(0,Math.min(1,t));
  return {x:x1+(x2-x1)*t,y:y1+(y2-y1)*t};
}

// 牛描画
function drawCow(c){
  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.angle);

  ctx.fillStyle="#6b4a32";
  ctx.beginPath();
  ctx.ellipse(0,0,24,15,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#5a3d2b";
  ctx.beginPath();
  ctx.ellipse(25,0,10,8,0,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// 描画
function drawPath(){
  ctx.strokeStyle="black";
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  path.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

function drawFence(){
  ctx.strokeStyle="brown";
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(fence[0].x,fence[0].y);
  fence.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.stroke();
}

// 入力
canvas.addEventListener("pointerdown",e=>{
  drawing=true;
  path=[getPos(e)];
});
canvas.addEventListener("pointermove",e=>{
  if(drawing) path.push(getPos(e));
});
canvas.addEventListener("pointerup",endDraw);

function getPos(e){
  return {x:e.clientX,y:e.clientY};
}

// 図形判定（簡易版）
function endDraw(){
  drawing=false;
  if(path.length<10) return;

  fence=path;

  let inside=cows.every(c=>pointInPoly(c,fence));
  if(inside){
    alert("クリア！");
  }
}

// 内側判定
function pointInPoly(p,vs){
  let inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i].x, yi=vs[i].y;
    let xj=vs[j].x, yj=vs[j].y;

    let intersect=((yi>p.y)!=(yj>p.y)) &&
      (p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}
</script>

</body>
</html>
