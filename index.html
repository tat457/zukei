<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>牛囲いゲーム</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #88cc66;
  }
  #menu {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: linear-gradient(#c9f7a5, #88cc66);
    z-index: 10;
    text-align: center;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 42px;
  }
  select, button {
    font-size: 18px;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
  }
  button {
    background: #2f7d32;
    color: white;
  }
  button:active {
    transform: translateY(1px);
  }
  #game {
    display: none;
    touch-action: none;
    width: 100vw;
    height: 100vh;
    background: #88cc66;
  }
  #ui {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 5;
    display: none;
    background: rgba(255,255,255,0.85);
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: bold;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  #status {
    margin-top: 6px;
    font-size: 14px;
    font-weight: normal;
  }
</style>
</head>
<body>

<div id="menu">
  <h1>牛囲いゲーム</h1>
  <div>
    <select id="shapeSelect">
      <option value="円">円</option>
      <option value="三角形">三角形</option>
      <option value="四角形">四角形</option>
      <option value="台形">台形</option>
      <option value="五角形">五角形</option>
    </select>
  </div>
  <button id="startBtn">スタート</button>
</div>

<div id="ui">
  図形: <span id="currentShape">円</span>
  <div id="status"></div>
</div>

<canvas id="game"></canvas>

<audio id="bgm" src="bocjou.mp3" loop></audio>
 
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const menu = document.getElementById("menu");
const ui = document.getElementById("ui");
const statusEl = document.getElementById("status");
const currentShapeEl = document.getElementById("currentShape");
const shapeSelect = document.getElementById("shapeSelect");
const startBtn = document.getElementById("startBtn");

let gameStarted = false;
let selectedShape = "円";

let cows = [];
let path = [];
let fence = null;
let drawing = false;
let frameCount = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", () => {
  resizeCanvas();
});

startBtn.addEventListener("click", startGame);

function startGame() {
  selectedShape = shapeSelect.value;
  currentShapeEl.textContent = selectedShape;

  menu.style.display = "none";
  ui.style.display = "block";
  canvas.style.display = "block";

  resizeCanvas();

  cows = [createCow(), createCow(), createCow()];
  path = [];
  fence = null;
  drawing = false;
  gameStarted = true;

  // ★ここ追加
  const bgm = document.getElementById("bgm");
  bgm.currentTime = 0;
  bgm.play().catch(()=>{}); // エラー防止
 
  showStatus("指で図形を描いて3頭の牛を囲ってください");
  requestAnimationFrame(loop);
}

function showStatus(message) {
  statusEl.textContent = message || "";
}

function createCow() {
  const margin = 80;
  return {
    x: margin + Math.random() * (window.innerWidth - margin * 2),
    y: margin + Math.random() * (window.innerHeight - margin * 2),
    vx: (Math.random() - 0.5) * 1.8,
    vy: (Math.random() - 0.5) * 1.8,
    angle: 0,
    radius: 18,
    lastHit: -100
  };
}

function loop() {
  if (!gameStarted) return;

  frameCount++;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrass();

  if (fence) drawFence(fence);
  if (drawing && path.length > 1) drawPath(path);

  for (const cow of cows) {
    moveCow(cow);
    drawCow(cow);
  }

  requestAnimationFrame(loop);
}

function drawGrass() {
  ctx.fillStyle = "#88cc66";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // かんたんな草のテクスチャ
  ctx.strokeStyle = "rgba(60,120,40,0.12)";
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.width; i += 28) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + 12, canvas.height);
    ctx.stroke();
  }
}

function moveCow(c) {
  c.x += c.vx;
  c.y += c.vy;

  if (c.x < c.radius) {
    c.x = c.radius;
    c.vx *= -1;
  }
  if (c.x > canvas.width - c.radius) {
    c.x = canvas.width - c.radius;
    c.vx *= -1;
  }
  if (c.y < c.radius) {
    c.y = c.radius;
    c.vy *= -1;
  }
  if (c.y > canvas.height - c.radius) {
    c.y = canvas.height - c.radius;
    c.vy *= -1;
  }

  if (drawing && path.length > 1) {
    reflectFromPolyline(c, path, false);
  }
  if (fence && fence.length > 1) {
    reflectFromPolyline(c, fence, true);
  }

  c.angle = Math.atan2(c.vy, c.vx);
}

function reflectFromPolyline(c, line, closed) {
  const now = frameCount;
  if (now - c.lastHit < 6) return;

  let hit = false;

  for (let i = 0; i < line.length - 1; i++) {
    if (bounceOnSegment(c, line[i], line[i + 1])) {
      hit = true;
      break;
    }
  }

  if (!hit && closed) {
    if (bounceOnSegment(c, line[line.length - 1], line[0])) {
      hit = true;
    }
  }

  if (hit) c.lastHit = now;
}

function bounceOnSegment(c, p1, p2) {
  const nearest = nearestPointOnSegment(c.x, c.y, p1.x, p1.y, p2.x, p2.y);
  const dx = c.x - nearest.x;
  const dy = c.y - nearest.y;
  const dist = Math.hypot(dx, dy);

  if (dist > c.radius) return false;

  let nx = dx;
  let ny = dy;
  const nLen = Math.hypot(nx, ny) || 1;
  nx /= nLen;
  ny /= nLen;

  const dot = c.vx * nx + c.vy * ny;
  c.vx = c.vx - 2 * dot * nx;
  c.vy = c.vy - 2 * dot * ny;

  c.x = nearest.x + nx * (c.radius + 1);
  c.y = nearest.y + ny * (c.radius + 1);

  return true;
}

function nearestPointOnSegment(px, py, x1, y1, x2, y2) {
  const vx = x2 - x1;
  const vy = y2 - y1;
  const wx = px - x1;
  const wy = py - y1;

  const len2 = vx * vx + vy * vy;
  let t = len2 === 0 ? 0 : (wx * vx + wy * vy) / len2;
  t = Math.max(0, Math.min(1, t));

  return {
    x: x1 + t * vx,
    y: y1 + t * vy
  };
}

function drawCow(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  // 影
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath();
  ctx.ellipse(2, 16, 22, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 体
  ctx.fillStyle = "#6b4a32";
  ctx.beginPath();
  ctx.ellipse(0, 0, 24, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // 白い模様
  ctx.fillStyle = "#d9c9b6";
  ctx.beginPath();
  ctx.ellipse(-4, -2, 8, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // 頭
  ctx.fillStyle = "#5a3d2b";
  ctx.beginPath();
  ctx.ellipse(25, -2, 11, 9, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 鼻
  ctx.fillStyle = "#d8a68b";
  ctx.beginPath();
  ctx.ellipse(31, 1, 5, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 耳
  ctx.fillStyle = "#5a3d2b";
  ctx.beginPath();
  ctx.ellipse(20, -10, 4, 2.5, -0.6, 0, Math.PI * 2);
  ctx.ellipse(20, 6, 4, 2.5, 0.6, 0, Math.PI * 2);
  ctx.fill();

  // 足
  ctx.strokeStyle = "#3a2518";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-10, 12); ctx.lineTo(-11, 24);
  ctx.moveTo(-2, 12);  ctx.lineTo(-2, 24);
  ctx.moveTo(9, 12);   ctx.lineTo(9, 24);
  ctx.moveTo(17, 12);  ctx.lineTo(18, 24);
  ctx.stroke();

  // 目
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.arc(27, -5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPath(line) {
  if (line.length < 2) return;
  ctx.strokeStyle = "rgba(0,0,0,0.9)";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.beginPath();
  ctx.moveTo(line[0].x, line[0].y);
  for (const p of line) ctx.lineTo(p.x, p.y);
  ctx.stroke();
}

function drawFence(line) {
  if (line.length < 2) return;

  ctx.strokeStyle = "#7a4a21";
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.beginPath();
  ctx.moveTo(line[0].x, line[0].y);
  for (const p of line) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.stroke();

  // 木の杭っぽい見た目
  ctx.fillStyle = "#8a5a2b";
  for (let i = 0; i < line.length; i += Math.max(1, Math.floor(line.length / 12))) {
    const p = line[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 入力
canvas.addEventListener("pointerdown", startDraw);
canvas.addEventListener("pointermove", drawMove);
canvas.addEventListener("pointerup", endDraw);
canvas.addEventListener("pointercancel", endDraw);
canvas.addEventListener("pointerleave", endDraw);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function startDraw(e) {
  if (!gameStarted) return;
  canvas.setPointerCapture?.(e.pointerId);
  drawing = true;
  path = [getPos(e)];
  showStatus("図形を描いています...");
  e.preventDefault();
}

function drawMove(e) {
  if (!drawing) return;
  const pos = getPos(e);
  const last = path[path.length - 1];
  if (!last || Math.hypot(pos.x - last.x, pos.y - last.y) >= 2.5) {
    path.push(pos);
  }
  e.preventDefault();
}

function endDraw() {
  if (!drawing) return;
  drawing = false;

  const validated = validateSelectedShape(selectedShape, path);

  if (!validated.ok) {
    fence = null;
    showStatus(validated.message);
    return;
  }

  fence = makeClosedPath(cleanPoints(path));

  const insideAll = cows.every(c => pointInPolygon(c, fence));
  if (insideAll) {
    showStatus("クリア！");
    setTimeout(() => alert("クリア！"), 80);
  } else {
    showStatus("図形は正しいですが、3頭すべてを囲えていません");
  }
}

function makeClosedPath(points) {
  const p = cleanPoints(points);
  if (p.length < 2) return p;
  return p;
}

function cleanPoints(points) {
  const out = [];
  for (const p of points) {
    const last = out[out.length - 1];
    if (!last || Math.hypot(p.x - last.x, p.y - last.y) >= 1.5) {
      out.push({ x: p.x, y: p.y });
    }
  }
  return out;
}

function validateSelectedShape(shape, rawPath) {
  const points = cleanPoints(rawPath);
  if (points.length < 12) {
    return { ok: false, message: "もっと大きく、はっきり描いてください" };
  }

  const box = boundingBox(points);
  const diag = Math.hypot(box.maxX - box.minX, box.maxY - box.minY);
  const closeDist = Math.hypot(points[0].x - points[points.length - 1].x, points[0].y - points[points.length - 1].y);

  if (closeDist > diag * 0.45) {
    return { ok: false, message: "図形の最後を最初に近づけて閉じてください" };
  }

  if (shape === "円") {
    return validateCircle(points);
  }

  const targetVertices = {
    "三角形": 3,
    "四角形": 4,
    "台形": 4,
    "五角形": 5
  }[shape];

  const hull = convexHull(points);
  if (hull.length < targetVertices) {
    return { ok: false, message: "形が少し崩れています" };
  }

  const simplified = simplifyToTargetVertices(hull, targetVertices);
  if (!simplified || simplified.length !== targetVertices) {
    return { ok: false, message: `選んだ${shape}として認識できませんでした` };
  }

  if (!isConvexPolygon(simplified)) {
    return { ok: false, message: "形がゆがんでいます" };
  }

  if (shape === "三角形") {
    return validateTriangle(simplified);
  }
  if (shape === "四角形") {
    return validateSquare(simplified);
  }
  if (shape === "台形") {
    return validateTrapezoid(simplified);
  }
  if (shape === "五角形") {
    return validatePentagon(simplified);
  }

  return { ok: false, message: "不明な図形です" };
}

function validateCircle(points) {
  const cx = points.reduce((s, p) => s + p.x, 0) / points.length;
  const cy = points.reduce((s, p) => s + p.y, 0) / points.length;

  const radii = points.map(p => Math.hypot(p.x - cx, p.y - cy));
  const avg = radii.reduce((s, r) => s + r, 0) / radii.length;
  const variance = radii.reduce((s, r) => s + (r - avg) ** 2, 0) / radii.length;
  const std = Math.sqrt(variance);
  const cv = std / avg;

  const minR = Math.min(...radii);
  const maxR = Math.max(...radii);

  if (cv > 0.18) {
    return { ok: false, message: "円がいびつです" };
  }
  if (maxR / Math.max(1, minR) > 1.75) {
    return { ok: false, message: "円としては細長すぎます" };
  }
  return { ok: true, message: "円として認識しました" };
}

function validateTriangle(poly) {
  if (poly.length !== 3) {
    return { ok: false, message: "三角形として認識できませんでした" };
  }
  const sides = sideLengths(poly);
  const ratio = Math.max(...sides) / Math.max(1, Math.min(...sides));
  if (ratio > 2.8) {
    return { ok: false, message: "三角形の辺のバランスが悪いです" };
  }
  return { ok: true, message: "三角形として認識しました" };
}

function validateSquare(poly) {
  if (poly.length !== 4) {
    return { ok: false, message: "四角形として認識できませんでした" };
  }

  const sides = sideLengths(poly);
  const ratio = Math.max(...sides) / Math.max(1, Math.min(...sides));
  if (ratio > 1.45) {
    return { ok: false, message: "四辺の長さがそろっていません" };
  }

  const angles = interiorAngles(poly);
  for (const a of angles) {
    if (Math.abs(a - 90) > 28) {
      return { ok: false, message: "角が直角に近くありません" };
    }
  }

  const opp1 = angleDiff(edgeAngle(poly[0], poly[1]), edgeAngle(poly[2], poly[3]));
  const opp2 = angleDiff(edgeAngle(poly[1], poly[2]), edgeAngle(poly[3], poly[0]));
  if (opp1 > 18 || opp2 > 18) {
    return { ok: false, message: "向かい合う辺が平行ではありません" };
  }

  return { ok: true, message: "四角形として認識しました" };
}

function validateTrapezoid(poly) {
  if (poly.length !== 4) {
    return { ok: false, message: "台形として認識できませんでした" };
  }

  const ang1 = edgeAngle(poly[0], poly[1]);
  const ang2 = edgeAngle(poly[1], poly[2]);
  const ang3 = edgeAngle(poly[2], poly[3]);
  const ang4 = edgeAngle(poly[3], poly[0]);

  const pair1 = angleDiff(ang1, ang3) < 16;
  const pair2 = angleDiff(ang2, ang4) < 16;
  const parallelCount = (pair1 ? 1 : 0) + (pair2 ? 1 : 0);

  if (parallelCount !== 1) {
    return { ok: false, message: "台形は向かい合う1組だけが平行です" };
  }

  const angles = interiorAngles(poly);
  const allNear90 = angles.every(a => Math.abs(a - 90) < 22);
  if (allNear90) {
    return { ok: false, message: "四角形に近すぎます" };
  }

  const sides = sideLengths(poly);
  const ratio = Math.max(...sides) / Math.max(1, Math.min(...sides));
  if (ratio > 3.2) {
    return { ok: false, message: "台形の辺のバランスが悪いです" };
  }

  return { ok: true, message: "台形として認識しました" };
}

function validatePentagon(poly) {
  if (poly.length !== 5) {
    return { ok: false, message: "五角形として認識できませんでした" };
  }

  const sides = sideLengths(poly);
  const ratio = Math.max(...sides) / Math.max(1, Math.min(...sides));
  if (ratio > 2.3) {
    return { ok: false, message: "五角形の辺の長さが大きく崩れています" };
  }

  const angles = interiorAngles(poly);
  if (angles.some(a => a < 40 || a > 160)) {
    return { ok: false, message: "五角形の角が大きく崩れています" };
  }

  return { ok: true, message: "五角形として認識しました" };
}

function simplifyToTargetVertices(points, targetVertices) {
  const box = boundingBox(points);
  const diag = Math.hypot(box.maxX - box.minX, box.maxY - box.minY);
  const epsList = [0.008, 0.012, 0.016, 0.02, 0.025, 0.03, 0.04, 0.05, 0.06, 0.08, 0.1];

  for (const f of epsList) {
    const simp = simplifyClosedPolygon(points, diag * f);
    if (simp.length === targetVertices) return simp;
  }

  return null;
}

function simplifyClosedPolygon(points, epsilon) {
  if (points.length < 3) return points.slice();

  let closed = points.slice();
  if (!samePoint(closed[0], closed[closed.length - 1])) {
    closed.push({ ...closed[0] });
  }

  let simplified = rdp(closed, epsilon);

  if (simplified.length > 1 && samePoint(simplified[0], simplified[simplified.length - 1])) {
    simplified.pop();
  }

  simplified = removeConsecutiveDuplicates(simplified);
  return simplified;
}

function rdp(points, epsilon) {
  if (points.length <= 2) return points.slice();

  let dmax = 0;
  let index = 0;

  const end = points.length - 1;
  for (let i = 1; i < end; i++) {
    const d = perpendicularDistance(points[i], points[0], points[end]);
    if (d > dmax) {
      index = i;
      dmax = d;
    }
  }

  if (dmax > epsilon) {
    const rec1 = rdp(points.slice(0, index + 1), epsilon);
    const rec2 = rdp(points.slice(index), epsilon);
    return rec1.slice(0, -1).concat(rec2);
  } else {
    return [points[0], points[end]];
  }
}

function perpendicularDistance(p, a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  if (dx === 0 && dy === 0) return Math.hypot(p.x - a.x, p.y - a.y);

  const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy);
  const tt = Math.max(0, Math.min(1, t));
  const x = a.x + tt * dx;
  const y = a.y + tt * dy;
  return Math.hypot(p.x - x, p.y - y);
}

function removeConsecutiveDuplicates(points) {
  const out = [];
  for (const p of points) {
    const last = out[out.length - 1];
    if (!last || !samePoint(last, p)) out.push({ x: p.x, y: p.y });
  }
  return out;
}

function samePoint(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y) < 0.001;
}

function sideLengths(poly) {
  const arr = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i];
    const b = poly[(i + 1) % poly.length];
    arr.push(Math.hypot(b.x - a.x, b.y - a.y));
  }
  return arr;
}

function edgeAngle(a, b) {
  let ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
  if (ang < 0) ang += 180;
  return ang;
}

function angleDiff(a, b) {
  let d = Math.abs(a - b) % 180;
  if (d > 90) d = 180 - d;
  return d;
}

function interiorAngles(poly) {
  const angles = [];
  for (let i = 0; i < poly.length; i++) {
    const prev = poly[(i - 1 + poly.length) % poly.length];
    const cur = poly[i];
    const next = poly[(i + 1) % poly.length];

    const v1x = prev.x - cur.x;
    const v1y = prev.y - cur.y;
    const v2x = next.x - cur.x;
    const v2y = next.y - cur.y;

    const dot = v1x * v2x + v1y * v2y;
    const len1 = Math.hypot(v1x, v1y);
    const len2 = Math.hypot(v2x, v2y);
    const cos = Math.max(-1, Math.min(1, dot / (len1 * len2 || 1)));
    angles.push(Math.acos(cos) * 180 / Math.PI);
  }
  return angles;
}

function isConvexPolygon(poly) {
  if (poly.length < 3) return false;
  let sign = 0;
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i];
    const b = poly[(i + 1) % poly.length];
    const c = poly[(i + 2) % poly.length];
    const cross = (b.x - a.x) * (c.y - b.y) - (b.y - a.y) * (c.x - b.x);
    if (cross !== 0) {
      const s = Math.sign(cross);
      if (sign === 0) sign = s;
      else if (sign !== s) return false;
    }
  }
  return true;
}

function boundingBox(points) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  return { minX, minY, maxX, maxY };
}

function convexHull(points) {
  const pts = points
    .map(p => ({ x: p.x, y: p.y }))
    .sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);

  if (pts.length <= 1) return pts;

  const cross = (o, a, b) =>
    (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);

  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
      lower.pop();
    }
    lower.push(p);
  }

  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
      upper.pop();
    }
    upper.push(p);
  }

  lower.pop();
  upper.pop();
  return lower.concat(upper);
}

function pointInPolygon(point, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > point.y) !== (yj > point.y)) &&
      (point.x < (xj - xi) * (point.y - yi) / ((yj - yi) || 1e-9) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
