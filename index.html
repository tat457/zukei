<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛囲いゲーム</title>
<style>
body { margin:0; font-family:sans-serif; text-align:center; }
#menu { padding:20px; }
button { margin:5px; padding:10px; font-size:16px; }
canvas { display:none; background:#88cc66; }
</style>
</head>
<body>

<div id="menu">
  <h1>牛囲いゲーム</h1>

  <button onclick="changeShape()">図形: <span id="shapeName">円</span></button>
  <br><br>
  <button onclick="startGame()">スタート</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const shapes = ["円","三角形","四角形","台形","五角形"];
let shapeIndex = 0;

let cows = [];
let path = [];
let fence = null;
let drawing = false;

// 図形切替
function changeShape(){
  shapeIndex = (shapeIndex + 1) % shapes.length;
  document.getElementById("shapeName").innerText = shapes[shapeIndex];
}

// 牛生成
function createCow(){
  return {
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    angle: 0
  };
}

function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  cows = [createCow(), createCow(), createCow()];
  requestAnimationFrame(loop);
}

// メインループ
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 草原
  ctx.fillStyle="#88cc66";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawFence();

  cows.forEach(c=>{
    moveCow(c);
    drawCow(c);
  });

  drawPath();

  requestAnimationFrame(loop);
}

// 牛移動
function moveCow(c){
  c.x += c.vx;
  c.y += c.vy;

  // 画面反射
  if(c.x<0||c.x>canvas.width) c.vx*=-1;
  if(c.y<0||c.y>canvas.height) c.vy*=-1;

  // 柵反射
  if(fence && pointInPolygon(c, fence)){
    c.vx *= -1;
    c.vy *= -1;
    c.x += c.vx*2;
    c.y += c.vy*2;
  }

  c.angle = Math.atan2(c.vy, c.vx);
}

// 牛描画（簡易リアル風）
function drawCow(c){
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.angle);

  // 体
  ctx.fillStyle="#5a3d2b";
  ctx.beginPath();
  ctx.ellipse(0,0,20,12,0,0,Math.PI*2);
  ctx.fill();

  // 頭
  ctx.fillStyle="#3d2a1f";
  ctx.beginPath();
  ctx.arc(20,0,8,0,Math.PI*2);
  ctx.fill();

  // 足
  ctx.strokeStyle="#000";
  ctx.beginPath();
  ctx.moveTo(-10,10); ctx.lineTo(-10,20);
  ctx.moveTo(10,10); ctx.lineTo(10,20);
  ctx.stroke();

  ctx.restore();
}

// 描画中ライン
function drawPath(){
  if(path.length<2) return;
  ctx.strokeStyle="black";
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  path.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

// 柵描画
function drawFence(){
  if(!fence) return;
  ctx.strokeStyle="brown";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(fence[0].x,fence[0].y);
  fence.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.stroke();
}

// 入力
canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("touchstart",startDraw);

canvas.addEventListener("mousemove",draw);
canvas.addEventListener("touchmove",draw);

canvas.addEventListener("mouseup",endDraw);
canvas.addEventListener("touchend",endDraw);

function getPos(e){
  if(e.touches){
    return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  return {x:e.clientX,y:e.clientY};
}

function startDraw(e){
  drawing=true;
  path=[];
}

function draw(e){
  if(!drawing) return;
  path.push(getPos(e));
}

function endDraw(){
  drawing=false;
  if(path.length<3) return;

  fence = path;

  // クリア判定
  let insideAll = cows.every(c=>pointInPolygon(c, fence));
  if(insideAll){
    setTimeout(()=>alert("クリア！"),100);
  }
}

// 点がポリゴン内か
function pointInPolygon(point, vs) {
  let x = point.x, y = point.y;
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i].x, yi = vs[i].y;
    let xj = vs[j].x, yj = vs[j].y;

    let intersect = ((yi > y) != (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
</script>

</body>
</html>
