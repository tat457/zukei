<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛囲いゲーム</title>
<style>
body { margin:0; font-family:sans-serif; text-align:center; }
#menu { padding:20px; }
button { margin:5px; padding:10px; font-size:16px; }
canvas { display:none; background:#88cc66; }
</style>
</head>
<body>

<div id="menu">
  <h1>牛囲いゲーム</h1>
  <div>
    <button onclick="setShape('circle')">円</button>
    <button onclick="setShape('triangle')">三角形</button>
    <button onclick="setShape('square')">四角形</button>
    <button onclick="setShape('trapezoid')">台形</button>
    <button onclick="setShape('pentagon')">五角形</button>
  </div>
  <br>
  <button onclick="startGame()">スタート</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let shape = "circle";
let cows = [];
let drawing = false;
let path = [];

function setShape(s){
  shape = s;
}

// 牛クラス
function createCow(){
  return {
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-0.5)*1,
    vy: (Math.random()-0.5)*1
  };
}

function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  cows = [createCow(), createCow(), createCow()];

  requestAnimationFrame(loop);
}

// 描画ループ
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 草原
  ctx.fillStyle = "#88cc66";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 牛
  cows.forEach(c=>{
    c.x += c.vx;
    c.y += c.vy;

    if(c.x<0||c.x>canvas.width) c.vx*=-1;
    if(c.y<0||c.y>canvas.height) c.vy*=-1;

    ctx.fillStyle="brown";
    ctx.beginPath();
    ctx.arc(c.x,c.y,15,0,Math.PI*2);
    ctx.fill();
  });

  // 描画中の線
  if(path.length>1){
    ctx.strokeStyle="black";
    ctx.beginPath();
    ctx.moveTo(path[0].x,path[0].y);
    path.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }

  requestAnimationFrame(loop);
}

// 入力処理
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("touchstart", startDraw);

canvas.addEventListener("mousemove", draw);
canvas.addEventListener("touchmove", draw);

canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("touchend", endDraw);

function getPos(e){
  if(e.touches){
    return {
      x:e.touches[0].clientX,
      y:e.touches[0].clientY
    };
  }
  return {x:e.clientX,y:e.clientY};
}

function startDraw(e){
  drawing = true;
  path = [];
}

function draw(e){
  if(!drawing) return;
  const pos = getPos(e);
  path.push(pos);
}

function endDraw(){
  drawing=false;

  // 判定（簡易：全牛がポリゴン内か）
  if(path.length<3) return;

  let insideAll = cows.every(c=>pointInPolygon(c, path));

  if(insideAll){
    alert("クリア！");
    location.reload();
  }
}

// 点がポリゴン内か
function pointInPolygon(point, vs) {
  let x = point.x, y = point.y;
  let inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i].x, yi = vs[i].y;
    let xj = vs[j].x, yj = vs[j].y;

    let intersect = ((yi > y) != (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
</script>

</body>
</html>
